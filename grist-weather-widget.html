<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>Widget Météo</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body {
      background-color: #e8f4fd;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    
    .carte {
      background-color: #5baee8;
      border-radius: 15px;
      padding: 30px;
      width: 300px;
      color: white;
    }
    
    .ville {
      font-size: 28px;
      font-weight: bold;
    }
    .pays {
      font-size: 14px;
      color: #dff0fb;
      margin-bottom: 20px;
    }
    
    .meteo-row {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 30px;
    }
    .icone {
      font-size: 64px;
    }
    .temperature {
      font-size: 48px;
      font-weight: bold;
      line-height: 1;
    }
    .description {
      font-size: 14px;
      color: #dff0fb;
      margin-top: 5px;
    }
    
    .grille {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
      background-color: #3d96d8;
      border-radius: 10px;
      padding: 15px;
    }
    .info-label {
      font-size: 12px;
      color: #dff0fb;
    }
    .info-valeur {
      font-size: 20px;
      font-weight: bold;
    }
    
    .bouton-sauvegarder {
      width: 100%;
      margin-top: 15px;
      padding: 12px;
      background-color: #ffffff;
      color: #5baee8;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    
    .bouton-sauvegarder:hover {
      background-color: #dff0fb;
    }
    
    .popup-fond {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      justify-content: center;
      align-items: center;
    }
    .popup {
      background-color: white;
      border-radius: 15px;
      padding: 25px;
      width: 280px;
      color: #333;
    }
    .popup h3 {
      margin-bottom: 15px;
      color: #5baee8;
      font-size: 18px;
    }
    .popup p {
      margin-bottom: 10px;
      font-size: 14px;
    }
    .popup-boutons {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 10px;
    }
    .bouton-annuler {
      flex: 1;
      padding: 10px;
      background-color: #e0e0e0;
      color: #333;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    .bouton-confirmer {
      flex: 1;
      padding: 10px;
      background-color: #5baee8;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
  
<body>
    
  <div class="popup-fond" id="popupFond">
    <div class="popup">
      <h3>Récapitulatif</h3>
      <p><strong>Ville :</strong> <span id="popupVille">--</span></p>
      <p><strong>Date :</strong> <span id="popupDate">--</span></p>
      <p><strong>Température :</strong> <span id="popupTemperature">--</span></p>
      <p><strong>Temps :</strong> <span id="popupTemps">--</span></p>
      <div class="popup-boutons">
        <button onclick="fermerPopup()" class="bouton-annuler">Annuler</button>
        <button onclick="confirmerSauvegarde()" class="bouton-confirmer">Confirmer</button>
      </div>
    </div>
  </div>  
  
  <div class="carte">
   
    <div class="ville" id="ville">Chargement...</div>
    <div class="pays" id="pays"></div>
    
    <div class="meteo-row">
      <div class="icone" id="icone">⏳</div>
      <div>
        <div class="temperature" id="temperature">--°C</div>
        <div class="description" id="description">--</div>
      </div>
    </div>
    
    <div class="grille">
      <div>
        <div class="info-label">Ressenti</div>
        <div class="info-valeur" id="ressenti">--</div>
      </div>
      <div>
        <div class="info-label">Humidité</div>
        <div class="info-valeur" id="humidite">--</div>
      </div>
    </div>  
    <button onclick="ouvrirPopup()" class="bouton-sauvegarder">
      Sauvegarder      
    </button>
  </div>
  
  <script>
    grist.ready({
      columns: [{ name: "Ville", title: "Ville", type: "Text"}],
      requiredAccess: "read table"
    });
    
    grist.onRecord(function(record) {
      var nomVille = record.Ville;
      
      afficherMeteo(nomVille);
    });
    
    function afficherMeteo(nomVille) {
      
      fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + nomVille + "&count=1&language=fr&format=json")
      .then(function(reponse) {
      return reponse.json();
    })
    .then(function(data) {
        
      if (!data.results || data.results.length === 0) {
        document.getElementById("ville").textContent = "Ville introuvable ❌";
        document.getElementById("pays").textContent = "";
        document.getElementById("icone").textContent = "⚠️";
        document.getElementById("temperature").textContent = "--°C";
        document.getElementById("description").textContent = "Vérifie le nom de la ville";
        document.getElementById("ressenti").textContent = "--";
        document.getElementById("humidite").textContent = "--";
        return Promise.reject("Ville introuvable");
      }
        
      var lat = data.results[0].latitude;
      var lon = data.results[0].longitude;
      var nom = data.results[0].name;
      var pays = data.results[0].country_code;
      
      document.getElementById("ville").textContent = nom;
      document.getElementById("pays").textContent = pays;
      
      return fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current=temperature_2m,apparent_temperature,relative_humidity_2m,weather_code");
      })
    .then(function(reponse) {
      return reponse.json();
    })
    .then(function(data) {
      var temp = Math.round(data.current.temperature_2m);
      var ressenti = Math.round(data.current.apparent_temperature);
      var humidite = data.current.relative_humidity_2m;
      var code = data.current.weather_code;
      
      document.getElementById("temperature").textContent = temp + "°C"
      document.getElementById("ressenti").textContent = ressenti + "°C"
      document.getElementById("humidite").textContent = humidite + "%"
      document.getElementById("icone").textContent = getIcone(code);
      document.getElementById("description").textContent = getDescription(code);
    });
      
    }
    
    
    function getIcone(code) {
      if (code === 0)  return "☀️";
      if (code <= 2)   return "🌤️";
      if (code === 3)  return "☁️";
      if (code <= 48)  return "🌫️";
      if (code <= 67)  return "🌧️";
      if (code <= 77)  return "❄️";
      if (code <= 82)  return "🌧️";
      if (code <= 99)  return "⛈️";
      return "🌡️";
    }
    
    function getDescription(code) {
      if (code === 0)  return "Ciel dégagé";
      if (code <= 2)   return "Principalement dégagé";
      if (code === 3)  return "Couvert";
      if (code <= 48)  return "Brouillard";
      if (code <= 67)  return "Pluie";
      if (code <= 77)  return "Neige";
      if (code <= 82)  return "Averses";
      if (code <= 99)  return "Orage";
      return "Inconnu";
    }
    
    function ouvrirPopup() {
      var ville = document.getElementById("ville").textContent;
      var temperature = document.getElementById("temperature").textContent;
      var temps = document.getElementById("description").textContent;
      var aujourdhui = new Date();
      var date = aujourdhui.getDate() + "/" + (aujourdhui.getMonth() + 1)+ "/" + aujourdhui.getFullYear();
      document.getElementById("popupVille").textContent = ville;
      document.getElementById("popupDate").textContent = date;
      document.getElementById("popupTemperature").textContent = temperature;    
      document.getElementById("popupTemps").textContent = temps;
      
      document.getElementById("popupFond").style.display = "flex";
    }
    
    function fermerPopup() {
      document.getElementById("popupFond").style.display = "none";
    }

   function confirmerSauvegarde() {
      var ville =  document.getElementById("popupVille").textContent;
      var date = document.getElementById("popupDate").textContent;
      var temperature = document.getElementById("popupTemperature").textContent;
      var temps = document.getElementById("popupTemps").textContent;
     
      var cleAPI = "51cf534a42713285edba9d3f001d8b6e4febb5bb";
      var docID = "2e7oHLmg4aNk";
      var url = "https://docs.getgrist.com/api/docs/" + docID + "/tables/Sauvegarde/records";

      fetch(url, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type"  : "application/json",
          "Authorization" : "Bearer " + cleAPI
        },
        body: JSON.stringify({
          records: [
            {
              fields: {
                "ville"           : ville,
                "date_sauvegarde" : date,
                "temperature"     : temperature,
                "temps"           : temps
              }
            }
          ]
        })
      })
     
     /*
      grist.docApi.applyUserActions([
        ["AddRecord", "Sauvegarde", null, {
          "ville"           : ville,
          "date_sauvegarde" : date,
          "temperature"     : temperature,
          "temps"           : temps
        }]
      ])
     */ 
  .then(function(){
    fermerPopup();
    alert("Sauvegarde effectuée");
  })
  .catch(function(erreur) {
    alert("Erreur : "+ erreur);
  });  
  }
  </script>
  
</body>
</html>
